// 드래그 위치 저장소: localStorage 값이 있으면 POS(기본 배치)보다 우선한다.
// fixed 플래그는 걸지 않는다 — physics가 꺼져 있으므로 노드는 드래그한
// 자리에 그대로 머물고, dragEnd에서 그 좌표를 저장한다.
const POS_STORE_KEY = 'graphify_graph_positions_v1';
let savedPos = {};
try { savedPos = JSON.parse(localStorage.getItem(POS_STORE_KEY) || '{}') || {}; } catch (e) { savedPos = {}; }

const nodesDS = new vis.DataSet(RAW_NODES.map(n => ({
  ...((savedPos[n.id] || POS[n.id]) ? { x: (savedPos[n.id] || POS[n.id]).x, y: (savedPos[n.id] || POS[n.id]).y } : {}),
  id: n.id, label: n.label, color: n.color, size: n.size, borderWidth: n.borderWidth || 1,
  font: { ...(n.font || {}), size: Math.max(22, (n.font && n.font.size) || 0) }, title: n.title,
  _community: n.community, _community_name: n.community_name,
  _source_file: n.source_file, _file_type: n.file_type, _degree: n.degree,
})));

const edgesDS = new vis.DataSet(RAW_EDGES.map((e, i) => ({

  label: '',

  arrows: { to: { enabled: true, scaleFactor: 1.0 } },

const container = document.getElementById('graph');
const network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, {
  physics: {
    enabled: false,
    solver: 'forceAtlas2Based',

      centralGravity: 0.005,
      springLength: 120,

      damping: 0.4,
      avoidOverlap: 0.8,
    },
    stabilization: { iterations: 200, fit: true },
  },
  interaction: {
    hover: true,
    tooltipDelay: 100,
    hideEdgesOnDrag: true,
    navigationButtons: false,
    keyboard: false,
  },
  nodes: { shape: 'dot', borderWidth: 1.5 },
  edges: { smooth: { type: 'continuous', roundness: 0.2 }, selectionWidth: 3 },
});

network.once('stabilizationIterationsDone', () => {
  network.setOptions({ physics: { enabled: false } });
});

// === 드래그 위치 영속화 ===============================================
// 드래그가 끝나면 해당 노드들의 좌표를 localStorage에 저장한다.
// (이 브라우저에서 다시 열 때 저장 위치가 기본 배치 POS를 덮어쓴다.)
network.on('dragEnd', params => {
  if (!params.nodes || params.nodes.length === 0) return;
  const positions = network.getPositions(params.nodes);
  params.nodes.forEach(id => {
    const p = positions[id];
    if (p) savedPos[id] = { x: Math.round(p.x), y: Math.round(p.y) };
  });
  try { localStorage.setItem(POS_STORE_KEY, JSON.stringify(savedPos)); } catch (e) {}
});

// "위치 초기화": 저장본을 지우고 파일에 내장된 기본 배치(POS)로 복귀.
document.getElementById('reset-pos-btn').addEventListener('click', () => {
  savedPos = {};
  try { localStorage.removeItem(POS_STORE_KEY); } catch (e) {}
  RAW_NODES.forEach(n => { if (POS[n.id]) network.moveNode(n.id, POS[n.id].x, POS[n.id].y); });
  network.fit({ animation: true });
});

// "위치 복사": 현재 전체 배치를 POS 상수 형식의 JSON으로 클립보드에 복사.
// 마음에 드는 배치를 이 파일의 `const POS = {...}` 줄에 붙여 넣으면
// (또는 그렇게 요청하면) 저장 없이도 모든 브라우저·배포본의 기본값이 된다.
document.getElementById('copy-pos-btn').addEventListener('click', () => {
  const all = network.getPositions(RAW_NODES.map(n => n.id));
  const entries = RAW_NODES.map(n => {
    const p = all[n.id];
    return `"${n.id}": {"x": ${Math.round(p.x)}, "y": ${Math.round(p.y)}}`;
  });
  const text = 'const POS = {' + entries.join(', ') + '};';
  const done = () => {
    const btn = document.getElementById('copy-pos-btn');
    const old = btn.textContent;
    btn.textContent = '복사됨!';
    setTimeout(() => { btn.textContent = old; }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, () => window.prompt('복사 실패 — 직접 복사하세요:', text));
  } else {
    window.prompt('직접 복사하세요:', text);
  }
});

function showInfo(nodeId) {
  const n = nodesDS.get(nodeId);
  if (!n) return;
  const neighborIds = network.getConnectedNodes(nodeId);
  const neighborItems = neighborIds.map(nid => {
    const nb = nodesDS.get(nid);
    const color = nb ? nb.color.background : '#555';
    return `<span class="neighbor-link" style="border-left-color:${esc(color)}" data-nid="${esc(nid)}">${esc(nb ? nb.label : nid)}</span>`;
  }).join('');
  document.getElementById('info-content').innerHTML = `
    <div class="field"><b>${esc(n.label)}</b></div>
    <div class="field">Type: ${esc(n._file_type || 'unknown')}</div>
    <div class="field">Community: ${esc(n._community_name)}</div>
    <div class="field">Source: ${esc(n._source_file || '-')}</div>
    <div class="field">Degree: ${n._degree}</div>
    ${neighborIds.length ? `<div class="field" style="margin-top:8px;color:#aaa;font-size:11px">Neighbors (${neighborIds.length})</div><div id="neighbors-list">${neighborItems}</div>` : ''}
  `;
}

function focusNode(nodeId) {
  network.focus(nodeId, { scale: 1.4, animation: true });
  network.selectNodes([nodeId]);
  showInfo(nodeId);
}

// Neighbor links use a data attribute + one delegated listener rather than an
// inline onclick. A node id/label sourced from a document or a scraped URL
// (graphify add) can contain a double-quote; dropping the stringified id
// unescaped into a quoted onclick both broke every link and allowed a hostile
// source to inject an event handler into the local report (stored XSS, #1838).
// esc() on data-nid keeps the value inside the attribute; the listener reads it
// back verbatim. Bound to document so it survives the innerHTML rebuild that
// recreates #neighbors-list on each showInfo().
document.addEventListener('click', e => {
  const el = e.target.closest('.neighbor-link');
  if (el && el.dataset.nid !== undefined) focusNode(el.dataset.nid);
});

// Track hovered node — hover detection is more reliable than click params
let hoveredNodeId = null;
network.on('hoverNode', params => {
  hoveredNodeId = params.node;
  container.style.cursor = 'pointer';
});
network.on('blurNode', () => {
  hoveredNodeId = null;
  container.style.cursor = 'default';
});
container.addEventListener('click', () => {
  if (hoveredNodeId !== null) {
    showInfo(hoveredNodeId);
    network.selectNodes([hoveredNodeId]);
  }
});
network.on('click', params => {
  if (params.nodes.length > 0) {
    showInfo(params.nodes[0]);
  } else if (hoveredNodeId === null) {
    document.getElementById('info-content').innerHTML = '<span class="empty">Click a node to inspect it</span>';
  }
});

const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = RAW_NODES.filter(n => n.label.toLowerCase().includes(q)).slice(0, 20);
  if (!matches.length) { searchResults.style.display = 'none'; return; }
  searchResults.style.display = 'block';
  matches.forEach(n => {
    const el = document.createElement('div');
    el.className = 'search-item';
    el.textContent = n.label;
    el.style.borderLeft = `3px solid ${n.color.background}`;
    el.style.paddingLeft = '8px';
    el.onclick = () => {
      network.focus(n.id, { scale: 1.5, animation: true });
      network.selectNodes([n.id]);
      showInfo(n.id);
      searchResults.style.display = 'none';
      searchInput.value = '';
    };
    searchResults.appendChild(el);
  });
});
document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput)
    searchResults.style.display = 'none';
});

function updateSelectAllState() {
  const total = LEGEND.length;
  const hidden = hiddenCommunities.size;
  selectAllCb.checked = hidden === 0;
  selectAllCb.indeterminate = hidden > 0 && hidden < total;
}

function toggleAllCommunities(hide) {
  document.querySelectorAll('.legend-item').forEach(item => {
    hide ? item.classList.add('dimmed') : item.classList.remove('dimmed');
  });
  document.querySelectorAll('.legend-cb').forEach(cb => {
    cb.checked = !hide;
  });
  LEGEND.forEach(c => {
    if (hide) hiddenCommunities.add(c.cid); else hiddenCommunities.delete(c.cid);
  });
  const updates = RAW_NODES.map(n => ({ id: n.id, hidden: hide }));
  nodesDS.update(updates);
  updateSelectAllState();
}

const legendEl = document.getElementById('legend');
LEGEND.forEach(c => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'legend-cb';
  cb.checked = true;
  cb.addEventListener('change', (e) => {
    e.stopPropagation();
    if (cb.checked) {
      hiddenCommunities.delete(c.cid);
      item.classList.remove('dimmed');
    } else {
      hiddenCommunities.add(c.cid);
      item.classList.add('dimmed');
    }
    const updates = RAW_NODES
      .filter(n => n.community === c.cid)
      .map(n => ({ id: n.id, hidden: !cb.checked }));
    nodesDS.update(updates);
    updateSelectAllState();
  });
  item.innerHTML = `<div class="legend-dot" style="background:${c.color}"></div>
    <span class="legend-label">${c.label}</span>
    <span class="legend-count">${c.count}</span>`;
  item.prepend(cb);
  item.onclick = (e) => {
    if (e.target === cb) return;
    cb.checked = !cb.checked;
    cb.dispatchEvent(new Event('change'));
  };
  legendEl.appendChild(item);
});
</script>
<script>
// Render hyperedges as shaded regions
const hyperedges = [{"label": "발견1 줄 세우기는 0차+연결지도 (랭킹 마진 +0.01)", "nodes": ["SFTF_InjMold", "SFTF_SewerPOC", "SFTF_PDNElectric", "SFTF_ThermalChip", "SFTF_BatteryThermal", "PFTF_CNC"]}, {"label": "발견2 2차는 크기·보정 (RMSE 4x, 잔차 0%)", "nodes": ["SFTF_Composite", "PFTF_Compression", "PFTF_Mold", "PFTF_Radiotherapy"]}, {"label": "발견3 1차를 죽이는 범인들 (보존칙·제곱식·강한 solver)", "nodes": ["SFTF_WarehouseAGV", "PFTF_AssetShock", "SFTF_UrbanTraffic"]}, {"label": "발견3' 대조: 1차가 사는 곳 (부호 결정적·1차 주연)", "nodes": ["SFTF_DataCenterTraffic", "PFTF_subMarine", "PFTF_Assembly", "PFTF_RainNowcast", "PFTF_Terrain", "PFTF_Solar", "PFTF_FXShock"]}, {"label": "발견4·5·6 보수성 게이트: 경계 vs 모멘트 · 양화사 · ±d", "nodes": ["PFTF_kDop", "PFTF_VisCull", "PFTF_Inspection"]}];
// afterDrawing passes ctx already transformed to network coordinate space.
// Draw node positions raw — no manual pan/zoom/DPR math needed.
network.on('afterDrawing', function(ctx) {
    hyperedges.forEach(h => {
        const positions = h.nodes
            .map(nid => network.getPositions([nid])[nid])
            .filter(p => p !== undefined);
        if (positions.length < 2) return;
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#6366f1';
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        // CONVEX hull (Andrew monotone chain), then expand from centroid
        const pts = positions.slice().sort((a, b) => a.x - b.x || a.y - b.y);
        const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
        const lower = [];
        for (const p of pts) {
            while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
            lower.push(p);
        }
        const upper = [];
        for (let i = pts.length - 1; i >= 0; i--) {
            const p = pts[i];
            while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
            upper.push(p);
        }
        const hull = lower.slice(0, -1).concat(upper.slice(0, -1));
        const cx = hull.reduce((s, p) => s + p.x, 0) / hull.length;
        const cy = hull.reduce((s, p) => s + p.y, 0) / hull.length;
        const expanded = hull.map(p => ({
            x: cx + (p.x - cx) * 1.25,
            y: cy + (p.y - cy) * 1.25
        }));
        ctx.moveTo(expanded[0].x, expanded[0].y);
        expanded.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.stroke();
        // Label
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#4f46e5';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        const topY = Math.min.apply(null, expanded.map(p => p.y)); ctx.fillText(h.label, cx, topY - 16);
        ctx.restore();
    });
// FINDING_DEPS_BEGIN — 발견 간 의존성 (분류표 노트의 DAG, layout_findings.py 정본)
const FINDING_DEPS = [
  {from:0, to:1, style:"solid",    label:"전제(사다리·레이스)"},
  {from:0, to:2, style:"solid",    label:"전제"},
  {from:0, to:4, style:"solid",    label:"전제", labelT:0.22},
  {from:2, to:1, style:"dotted",   label:"\u2124\u2082 보조정리", labelT:0.78},
  {from:2, to:4, style:"double",   label:"\u2124\u2082 쌍대(\u00b1d)"},
  {from:2, to:3, style:"contrast", label:"소거 \u2194 생존 대비"},
];
function _regionCentroid(h) {
  const ps = h.nodes.map(nid => network.getPositions([nid])[nid]).filter(p => p);
  return {x: ps.reduce((s,p)=>s+p.x,0)/ps.length,
          y: ps.reduce((s,p)=>s+p.y,0)/ps.length};
}
(function(ctx) {
  ctx.save();
  FINDING_DEPS.forEach(dp => {
    const a = _regionCentroid(hyperedges[dp.from]);
    const b = _regionCentroid(hyperedges[dp.to]);
    const dx = b.x-a.x, dy = b.y-a.y, L = Math.hypot(dx,dy);
    const ux = dx/L, uy = dy/L;
    const x1 = a.x+ux*115, y1 = a.y+uy*115;   // 영역 라벨을 피해 안쪽에서 시작/끝
    const x2 = b.x-ux*135, y2 = b.y-uy*135;
    // 전부 dashed + 5배 두께 + 반투명: 노드 간 실선 엣지와 확실히 구분
    ctx.beginPath();
    ctx.lineWidth = dp.style === "double" ? 15 : 8;
    ctx.strokeStyle = dp.style === "contrast" ? "#8a8a5e" : "#a5a8f5";
    ctx.setLineDash(dp.style === "dotted" ? [4,10]
                    : dp.style === "double" ? [22,14]
                    : dp.style === "contrast" ? [10,12] : [14,10]);
    ctx.globalAlpha = 0.22;
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.setLineDash([]);
    if (dp.style !== "contrast") {            // 화살촉 (두께에 맞춰 확대)
      const ah = dp.style === "double" ? 34 : 26;
      ctx.beginPath();
      ctx.moveTo(x2+ux*10,y2+uy*10);
      ctx.lineTo(x2-ux*ah-uy*ah*0.45, y2-uy*ah+ux*ah*0.45);
      ctx.lineTo(x2-ux*ah+uy*ah*0.45, y2-uy*ah-ux*ah*0.45);
      ctx.closePath();
      ctx.globalAlpha = 0.32;
      ctx.fillStyle = ctx.strokeStyle; ctx.fill();
    }
    ctx.globalAlpha = 0.95;
    ctx.fillStyle = "#4a4dbf";
    ctx.font = "18px sans-serif"; ctx.textAlign = "center";
    const t = dp.labelT === undefined ? 0.5 : dp.labelT;
    ctx.fillText(dp.label, x1+(x2-x1)*t, y1+(y2-y1)*t - 6);
  });
  ctx.restore();
})(ctx);
// 발견 영역 라벨 왼쪽에 사다리 글리프(0차·1차·2차·topology) — 시그니처 다이어그램과 동일 모티프
const REGION_GLYPHS = [
  [["m0", 0], ["topo", -34]],      // 발견1: 0차 + 연결지도
  [["F", 0]],                       // 발견2: 2차
  [["m", 0], ["kill", 0]],          // 발견3: 1차 소거(빨간 사선)
  [["m", 0]],                       // 발견3': 1차 생존
  [["gate", 0]],                    // 발견4·5·6: 게이트(체크)
];
function _glyph(ctx, type, x, y) {
  ctx.save();
  ctx.strokeStyle = "#4f46e5"; ctx.fillStyle = "#4f46e5"; ctx.lineWidth = 2;
  if (type === "m0") { ctx.beginPath(); ctx.arc(x, y, 7, 0, 6.2832); ctx.fill(); }
  else if (type === "m") {
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x - 9, y + 7); ctx.lineTo(x + 5, y - 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 10, y - 7);
    ctx.lineTo(x + 1, y - 6); ctx.lineTo(x + 6, y + 2); ctx.closePath(); ctx.fill();
  } else if (type === "F") {
    ctx.translate(x, y); ctx.rotate(-0.42);
    ctx.beginPath(); ctx.ellipse(0, 0, 12, 6.5, 0, 0, 6.2832); ctx.stroke();
    ctx.lineWidth = 1.1;
    ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(12, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -6.5); ctx.lineTo(0, 6.5); ctx.stroke();
  } else if (type === "topo") {
    ctx.fillStyle = "#666666"; ctx.strokeStyle = "#666666"; ctx.lineWidth = 1.4;
    [[-8, -8], [0, -10], [8, -7]].forEach(p => {
      ctx.beginPath(); ctx.arc(x + p[0], y + p[1], 2.6, 0, 6.2832); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + p[0], y + p[1]); ctx.lineTo(x, y + 5); ctx.stroke();
    });
    ctx.fillStyle = "#4f46e5"; ctx.fillRect(x - 4, y + 4, 8, 7);
    ctx.strokeStyle = "#4f46e5"; ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.moveTo(x - 6, y + 14); ctx.lineTo(x + 6, y + 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x - 3.5, y + 17); ctx.lineTo(x + 3.5, y + 17); ctx.stroke();
  } else if (type === "kill") {
    ctx.strokeStyle = "#c04040"; ctx.lineWidth = 2.6;
    ctx.beginPath(); ctx.moveTo(x - 11, y + 10); ctx.lineTo(x + 11, y - 10); ctx.stroke();
  } else if (type === "gate") {
    ctx.strokeStyle = "#2e9e44"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x - 8, y); ctx.lineTo(x - 2, y + 7); ctx.lineTo(x + 9, y - 8);
    ctx.stroke();
  }
  ctx.restore();
}
(function(ctx) {
  hyperedges.forEach((h, i) => {
    const glyphs = REGION_GLYPHS[i] || [];
    if (!glyphs.length) return;
    const ps = h.nodes.map(nid => network.getPositions([nid])[nid]).filter(p => p);
    if (ps.length < 2) return;
    const cy = ps.reduce((s, p) => s + p.y, 0) / ps.length;
    const cx = ps.reduce((s, p) => s + p.x, 0) / ps.length;
    const minY = Math.min.apply(null, ps.map(p => p.y));
    const topY = cy + (minY - cy) * 1.25;          // hull 라벨과 동일한 확장 규칙
    ctx.font = "bold 20px sans-serif";
    const w = ctx.measureText(h.label).width;
    const gx = cx - w / 2 - 26, gy = topY - 23;    // 라벨 baseline(topY-16) 좌측
    glyphs.forEach(g => _glyph(ctx, g[0], gx + g[1], gy));
  });
})(ctx);
// FINDING_DEPS_END
});
</script>
